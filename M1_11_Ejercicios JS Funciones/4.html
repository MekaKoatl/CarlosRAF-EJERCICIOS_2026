    <title>4</title>

  <body>
    <script>
      function sumar(a, b) {
        return a + b;
      }

      let num1 = parseFloat(prompt("Introduce el primer número:"));
      let num2 = parseFloat(prompt("Introduce el segundo número:"));

      let resultado = sumar(num1, num2);

      alert("El resultado es: " + resultado);
    </script>
  </body>
</html>
