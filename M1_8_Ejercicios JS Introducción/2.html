<!doctype html>
<html lang="esp">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2</title>
  </head>
  <body>
    <div>
      <p>¿Cual es tu nombre?</p>
      <input type="text" id="name" />
      <button onclick="guardar()">guardar</button>
      <p id="show-name"></p>
    </div>

    <script>
      function guardar() {
        let name = document.getElementById("name").value;
        document.getElementById("show-name").innerText = `Hola ${name}, mucho gusto`;
      }
    </script>
  </body>
</html>
