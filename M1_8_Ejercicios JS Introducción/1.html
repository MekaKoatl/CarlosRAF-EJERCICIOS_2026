  <body>
    <div>
      <h1 id="smaug"></h1>
      <p id="habla"></p>
    </div>

    <script>
      document.getElementById("smaug").innerText = `Yo soy Smaug`;
      document.getElementById("habla").innerText = `¡Jinete del barril! Desconozco tu olor, pero si no eres uno de esos hombres del lago, entonces contaste con su ayuda.

Me asombra, jinete del barril, que hayas tenido el valor de entrar en mi guarida.

Y por una entrada que mi vasto conocimiento y mi larga memoria han permitido que se filtre en los recovecos de mi mente.

¿Acaso no has oído las historias que cuentan sobre Smaug, el Gran Dragón? ¿El Destructor de Dale y el Terror de la Montaña Solitaria?

¿Cómo, tras oír las historias de grandes tesoros en los salones de los Enanos, viajé hasta allí desde el frío e implacable Norte?

¿Cómo, al llegar a la zona, procedí a arrasar la cercana ciudad humana de Dale y a apoderarme del oro, las armaduras y las joyas de los Enanos para mi propio y magnífico tesoro?

Y, sobre todo, ¿acaso no has oído que soy el verdadero Rey bajo la Montaña?

¿Acaso no has oído hablar de mi temible gloria?

Pero tal vez no; tal vez te hayan encomendado una tarea y la hayas llevado a cabo sin darte cuenta de con quién te enfrentabas.

Pero no temas, jinete de barril; pronto te explicaré por qué mi nombre se susurra incluso en las Colinas de Hierro, donde viven los enanos, temerosos de que dirija mi atención a sus salones y tesoros.

Mi nombre apenas se menciona en Ciudad del Lago. Recuerdan bien la destrucción que causé en la tierra a mi llegada.

Pero sobrevolaré Ciudad del Lago una vez más, solo para demostrarles que viven únicamente bajo mi voluntad.

Les demostraré que soy más fuerte, más poderoso que ellos, y que siempre lo seré.

Sembraré la destrucción una vez más, para darles una lección sobre mi imponente poder.

No abandonaré la ciudad hasta que desaparezca por completo.

Pero, jinete de barril, te buscaré personalmente. Te buscaré, pues me arrebataste una copa de oro, incrustada de joyas.

¿Acaso no has oído hablar de lo celosamente que los dragones custodian sus tesoros?

¿Acaso no has oído hablar de la mala suerte que supone provocar la ira de un dragón?

Eres un necio, jinete de barril.

No hablas de querer recuperar mi gigantesco tesoro de joyas, oro y armaduras; en cambio, afirmas que tú y tus compañeros habéis venido a la Montaña Solitaria en busca de venganza.

¿Venganza? ¡Ja! Yo derroté a los guerreros de antaño que una vez defendieron al Rey Enano y sus palacios de la montaña. 

¡El supuesto Rey Enano bajo la Montaña ha muerto a manos de mis garras!

¡Soy el legítimo Rey bajo la Montaña, y lo seré para siempre!

¡Las joyas y las escamas de hierro que me cubren me dan una armadura como escudos de diez puntas!

¡Mis dientes son espadas!

¡Mis garras son lanzas!

¡El golpe de mi cola es un rayo que atraviesa el cielo!

¡El batir de mis alas es un huracán!

Mi aliento de fuego, mi sello personal, es la muerte.

Comprenderás, jinete de barril, que soy el Gran Dragón Smaug, Destructor de Dale y Terror de la Montaña Solitaria.

Volveré a sobrevolar Ciudad del Lago.

Me verán y recordarán quién es el verdadero Rey bajo la Montaña.`;

    </script>
  </body>
</html>
