<!doctype html>
<html lang="esp">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>15</title>
  </head>
  <body>
    <script>
      let a = parseInt(prompt("Introduce un número:"));
      let b = parseInt(prompt("Introduce otro número:"));

      let a2 = b;
      let b2 = a;

      a = a2;
      b = b2;

      alert(
        "Ahora he cambiado tus valores, ahora el primero es: " +
          a +
          ", y el segundo es: " +
          b,
      );
    </script>
  </body>
</html>
