<!doctype html>
<html lang="esp">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>16</title>
  </head>
  <body>
    <script>
      let numdigi = prompt("Introduce un número de 3 dígitos (Ej: 108):");

      let suma = 0;
      for (let digito of numdigi) {
        suma += parseInt(digito);
      }

      alert("La suma de los dígitos es: " + suma);
    </script>
  </body>
</html>
