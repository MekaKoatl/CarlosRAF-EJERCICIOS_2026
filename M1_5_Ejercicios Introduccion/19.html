<!doctype html>
<html lang="esp">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>19</title>
  </head>
  <body>
    <script>
      let dividendo = parseInt(prompt("Introduce el dividendo:"));
      let divisor   = parseInt(prompt("Introduce el divisor:"));

      let cociente = Math.floor(dividendo / divisor);
      let resto    = dividendo - (divisor * cociente);

      alert("El resto de " + dividendo + " / " + divisor + " es: " + resto);
    </script>
  </body>
</html>
