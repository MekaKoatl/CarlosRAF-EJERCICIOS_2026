<!doctype html>
<html lang="esp">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>17</title>
  </head>
  <body>
    <script>
      let digi = parseInt(prompt("Introduce un número:"));

      let digic = digi * 11;   // nn
      let digicc = digi * 111; // nnn

      alert("La suma ("+digi+" + "+digic+" + "+digicc+") es: " + (digi + digic + digicc));
    </script>
  </body>
</html>
