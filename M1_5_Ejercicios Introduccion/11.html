<!doctype html>
<html lang="esp">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>11</title>
  </head>
  <body>
    <script>
      let temperatura = parseInt(prompt("Introduce una temperatura:"));

      let far = (temperatura * 9) / 5 + 32;

      alert(
        "Si tu temperatura en Celsius es de " +
          temperatura +
          "Cº, eso equivale a: " +
          far +
          "fº",
      );
    </script>
  </body>
</html>
