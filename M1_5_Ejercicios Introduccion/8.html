<!doctype html>
<html lang="esp">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>8</title>
  </head>
  <body>
    <h1 id="In"></h1>
    <p id="r1"></p>
    <p id="r2"></p>
    <p id="r3"></p>
    <p id="r4"></p>
    <p id="r5"></p>
    <p id="r6"></p>

    <script>
      let input1 = prompt("Introduce un número:");

      let mul1 = parseInt(input1 * 1);
      let mul2 = parseInt(input1 * 2);
      let mul3 = parseInt(input1 * 3);
      let mul4 = parseInt(input1 * 4);
      let mul5 = parseInt(input1 * 5);
      let mul6 = parseInt(input1 * 6);
      let mul7 = parseInt(input1 * 7);
      let mul8 = parseInt(input1 * 8);
      let mul9 = parseInt(input1 * 9);
      let mul10 = parseInt(input1 * 10);

      document.getElementById("In").innerHTML =
        "La tabla de multiplicación de " + input1 + " es: ";
      document.getElementById("r1").innerHTML = mul1;
      document.getElementById("r2").innerHTML = mul2;
      document.getElementById("r3").innerHTML = mul3;
      document.getElementById("r4").innerHTML = mul4;
      document.getElementById("r5").innerHTML = mul5;
      document.getElementById("r6").innerHTML = mul6;
      document.getElementById("r7").innerHTML = mul7;
      document.getElementById("r8").innerHTML = mul8;
      document.getElementById("r9").innerHTML = mul9;
      document.getElementById("r10").innerHTML = mul10;
    </script>
  </body>
</html>
