<!doctype html>
<html lang="esp">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>10</title>
  </head>
  <body>
    <script>
      let input1 = parseInt(prompt("Introduce un número:"));
      let input2 = parseInt(prompt("Introduce otro número:"));
      let input3 = parseInt(prompt("Introduce un ultimo número:"));

      let media = (input1 + input2 + input3) / (3).toFixed(2);

      alert(
        "La media de " +
          input1 +
          " y " +
          input2 +
          " y " +
          input3 +
          " es =" +
          media,
      );
    </script>
  </body>
</html>
