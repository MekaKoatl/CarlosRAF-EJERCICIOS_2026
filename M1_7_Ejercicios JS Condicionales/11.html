    <script>
      let num1 = parseInt(prompt("Introduce un número entre 25 y 75:"));
      let num2 = parseInt(prompt("Introduce otro número entre 25 y 75:"));

      let dec1 = Math.floor(num1 / 10);
      let uni1 = num1 % 10;
      let dec2 = Math.floor(num2 / 10);
      let uni2 = num2 % 10;

if (num1 < 25 || num1 > 75 || num2 < 25 || num2 > 75) {
    alert("El número ingresado está fuera de lo pedido");
}

      if (dec1 === dec2 || dec1 === uni2 || uni1 === dec2 || uni1 === uni2) {
        alert("Los números ingresados " + num1 + " y " + num2 + " tienen un dígito en común.");
      } else {
        alert("Los números ingresados " + num1 + " y " + num2 + " no tienen dígitos en común.");
      }
    </script>
