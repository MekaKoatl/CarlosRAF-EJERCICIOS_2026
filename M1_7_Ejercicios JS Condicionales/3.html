<!doctype html>
<html lang="esp">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3</title>
  </head>
  <body>
    <script>
      let num1 = parseInt(prompt("Introduce un número:"));
      let num2 = parseInt(prompt("Introduce otro número:"));
      let num3 = parseInt(prompt("Introduce un ultimo número:"));

      if ((num1 + num2) === num3) {
        alert("La suma de " + num1 + " y " + num2 + " es igual a " + num3);
      } else {
        alert("Los dos primeros números ingresados no suman el tercer número");
      }
    </script>
  </body>
</html>
