        "Elige una opción (ingresa el numero de la opción):\n" +
        "1. Ver perfil\n" +
        "2. Editar perfil\n" +
        "3. Configuración\n" +
        "4. Cerrar sesión"
      );

      // if/else
      if (menu === "1") {
        alert("Ver perfil");
      } else if (menu === "2") {
        alert("Editar perfil");
      } else if (menu === "3") {
        alert("Configuración");
      } else if (menu === "4") {
        alert("Cerrar sesión");
      } else {
        alert("Opción no válida");
