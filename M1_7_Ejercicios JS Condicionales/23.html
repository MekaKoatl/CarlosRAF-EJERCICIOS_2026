<html lang="esp">

    <meta charset="UTF-8" />

    <title>23</title>

  <body>
    <script>
      let año = parseInt(prompt("Introduce un año:"));

      if (año % 400 === 0) {
        alert(año + " es bisiesto.");
      } else if (año % 100 === 0) {
        alert(año + " NO es bisiesto.");
      } else if (año % 4 === 0) {
        alert(año + " es bisiesto.");
      } else {
        alert(año + " NO es bisiesto.");
      }
    </script>
  </body>
</html>
