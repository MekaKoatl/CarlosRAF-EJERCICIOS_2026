<!doctype html>
<html lang="esp">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>7</title>
  </head>
  <body>
    <script>
      let numerador   = parseFloat(prompt("Introduce el numerador:"));
      let denominador = parseFloat(prompt("Introduce el denominador:"));

      if (denominador === 0) {
        alert("No se puede dividir por cero.");
      } else {
        alert("Resultado: " + (numerador / denominador));
      }
    </script>
  </body>
</html>
