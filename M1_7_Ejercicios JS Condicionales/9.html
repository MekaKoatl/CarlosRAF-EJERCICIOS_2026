<!doctype html>
<html lang="esp">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>9</title>
  </head>
  <body>
    <script>
      let temp = parseFloat(prompt("¿Qué temperatura hace donde estás?"));

      if (temp > 40) {
        alert("Sacate de ahí");
      } else if (temp >= 30) {
        alert("Enciende el aire acondicionado");
      } else if (temp >= 20) {
        alert("No hagas nada");
      } else if (temp >= 10) {
        alert("Enciende la calefacción");
      } else {
        alert("Vete a otro sitio");
      }
    </script>
  </body>
</html>
