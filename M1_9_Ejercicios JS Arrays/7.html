<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>7</title>
  </head>
  <body>
    <script>
      let nums = [];
      let media = 0;

      for (let i = 0; i < 10; i++) {
        nums.push(parseInt(Math.random() * 100));
      }

      for (let o = 0; o < 10; o++) {
        media += nums[o];
      }

      media = media / 10;

      alert(media);
    </script>
  </body>
</html>
