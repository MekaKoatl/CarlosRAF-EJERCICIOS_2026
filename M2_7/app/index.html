<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hotel</title>
  <style>
    body { font-family: sans-serif; padding: 1rem; }
    h2 { margin-top: 1.5rem; }
    .card { border: 1px solid #ccc; padding: 0.5rem; margin: 0.5rem 0; border-radius: 6px; }
    .disponible { color: green; }
    .ocupado { color: red; }
    input { margin: 4px; padding: 6px; }
    button { padding: 6px 12px; cursor: pointer; }
  </style>
</head>
<body>

  <h1>Hotel Dashboard</h1>

  <h2>Registrar cliente</h2>
  <input type="text" id="nombre" placeholder="Nombre" />
  <input type="text" id="apellido" placeholder="Apellido" />
  <input type="text" id="numdoc" placeholder="DNI / Pasaporte" />
  <button onclick="registrarCliente()">Registrar</button>
  <p id="msg-cliente"></p>

  <h2>Clientes</h2>
  <div id="lista-clientes"></div>

  <h2>Habitaciones</h2>
  <div id="lista-habitaciones"></div>

  <h2>Reservas</h2>
  <div id="lista-reservas"></div>

  <script src="index.js"></script>
</body>
</html>
