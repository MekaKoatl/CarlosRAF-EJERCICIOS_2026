    <main>
      <div id="Libros"></div>
    </main>

    <div id="lista-mesas"></div>
    <button onclick="getMesas()">Ver mesas</button>

    <div>
      <input
        type="text"
        id="tamanno"
        placeholder="Tamaño de la mesa, ej: 8x10"
      />
      <input type="text" id="color" placeholder="Café" />
      <input type="text" id="material" placeholder="Madera" />
      <input type="number" id="patas" placeholder="4" />
      <button onclick="annadirMesa()">Añadir mesa</button>
    </div>

    <script>
      url = "http://localhost:3000";

      function mostrarLibros() {
        document.getElementById("Libros").innerHTML = "";
        fetch(`${url}/api/libros`)
          .then((res) => res.json())
          .then((data) => {
            data.forEach((libro) => {
              document.getElementById("Libros").innerHTML +=
                `<div><h3>${libro.titulo}</h3><h4>${libro.estatus}</h4></div>`;
            });
          });
      }

      mostrarLibros();

      function cambiarEstado(titulo) {
        fetch();
      }
    </script>

    <script>
      function getMesas() {
        fetch("http://localhost:3000/mesas")
          .then((res) => res.json())
          .then((data) => {
            let html = data
              .map((mesa) => `<p>${JSON.stringify(mesa)}</p>`)
              .join("");
            document.getElementById("lista-mesas").innerHTML = html;
          });
      }
    </script>
    <script>
      function annadirMesa() {
        let mesa_tamanno = document.getElementById("tamanno").value;
        let mesa_color = document.getElementById("color").value;
        let mesa_material = document.getElementById("material").value;
        let mesa_number = document.getElementById("patas").value;
        fetch("http://localhost:3000/api/annadir", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            tamanno: mesa_tamanno,
            color: mesa_color,
            material: mesa_material,
            patas: mesa_number,
          }),
        })
          .then((res) => res.json())
          .then((data) => console.log(data));
      }
    </script>
    <script>
      function send() {
        const data = document.getElementById("data").value;
        fetch(`http://localhost:3000/data?data1=${data}`)
          .then((res) => res.json())
          .then((data) => {
            console.log(data);
          });
      }

      function sendData() {
        let getData = document.getElementById("post-data").value;
        console.log(getData);
        fetch("http://localhost:3000/post-data", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            data: getData,
          }),
        })
          .then((res) => res.json())
          .then((data) => {
            console.log(data);
          });
      }
    </script>
