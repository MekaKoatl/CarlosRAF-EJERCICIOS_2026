<!doctype html>
<html lang="esp">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>5</title>
  </head>
  <body>
    <script>
      let texto    = prompt("Introduce un texto:");
      let buscar   = prompt("¿Qué palabra quieres reemplazar?:");
      let reemplazar = prompt("¿Por qué palabra?:");

      let resultado = texto.replace(buscar, reemplazar);

      alert("Resultado: " + resultado);
    </script>
  </body>
</html>
