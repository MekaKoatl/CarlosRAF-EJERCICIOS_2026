<!doctype html>
<html lang="esp">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>6</title>
  </head>
  <body>
    <script>
      let palabra = prompt("Introduce una palabra en minúsculas:");

      let mitad = Math.floor(palabra.length / 2);

      let resultado = palabra.substring(0, mitad) + palabra.substring(mitad).toUpperCase();

      alert(resultado);
    </script>
  </body>
</html>
